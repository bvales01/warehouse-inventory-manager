<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <nav class="navBar">
        <div class="logo">InventoryPro</div>
        <ul>
            <li><a href="index.html">Dashboard</a></li>
            <li><a href="inventory.html" class="active">Inventory</a></li>
            <li><a href="history.html">History</a></li>
            <li><a href="actions.html">Actions</a></li>
        </ul>
    </nav>

    <main class="inventory container">
        <header class="header">Inventory</header>

        <section class="filters card">
            <div class="filter-group">
                <input type="text" id="searchInput" placeholder="Search by item name">

                <select id="locationFilter">
                    <option value="">All Locations</option>
                </select>

                <select id="sortFilter">
                    <option value="">Sort By</option>
                    <option value="nameAsc">Name (A-Z)</option>
                    <option value="nameDesc">Name (Z-A)</option>
                    <option value="qtyAsc">Quantity (Low to High)</option>
                    <option value="qtyDesc">Quantity (High to Low)</option>
                </select>
            </div>
        </section>

        <section id="inventory" class="active-inventory card">
            <table id="inventoryTable">
                <thead>
                    <tr>
                        <th>Item Name</th>
                        <th>Location</th>
                        <th>Quantity</th>
                    </tr>
                </thead>
                <tbody id="inventoryList">
                    <tr>
                        <td colspan="3">No items in inventory.</td>
                    </tr>
                </tbody>
            </table>
        </section>

        <div class="back-to-dashboard">
            <a href="index.html" class="backBtn">Back to Dashboard</a>
        </div>
    </main>
        

    </main>

    <script src="app.js"></script>
    
</body>
</html>
