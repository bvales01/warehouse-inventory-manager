<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InventoryPro Dashboard</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <nav class="navBar">
        <div class="logo">InventoryPro</div>
        <ul>
            <li><a href="index.html" class="active">Dashboard</a></li>
            <li><a href="inventory.html">Inventory</a></li>
            <li><a href="history.html">History</a></li>
            <li><a href="actions.html">Actions</a></li>
        </ul>
    </nav>

    <main class="container">
        <header class="header">Dashboard</header>

        <div class="dashboardGrid">
            <section id="alerts" class="alert-card">
                <h2>Low Stock Alerts</h2>
                <div id="lowStockList">Empty</div>
            </section>

        <section id="quickActions" class="quick-actions">
            <h2>Quick Actions</h2>
            <div class="input-group">
                <input type="text" id="barcodeInput" placeholder="Enter barcode (e.g. 041500052316)">
                <button id="lookupBtn">Lookup</button>
            </div>

            <div class="form-fields">
                <input type="text" id="itemName" placeholder="Item Name">
                <select id="itemLocation">
                    <option value="">Select Location</option>
                </select>
                <input type="number" id="itemQty" placeholder="Qty">

                <div class="buttons">
                    <button id="addBtn" class="btn-primary">Add</button>
                    <button id="removeBtn" class="btn-caution">Remove</button>
                </div>
            </div>

        </section>

        <section class="chart-section" id="inventory-report">
            <h2>Inventory Distribution</h2>
            <div class="chart-container">
                <canvas id="inventoryChart"></canvas>
            </div>
        </section>
   
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="app.js"></script>
    
</body>
</html>
